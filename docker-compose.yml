services:
  db:
    image: postgres:16
    container_name: webbuilder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webbuilder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webbuilder"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: webbuilder-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Local Postgres has no pooler, so DATABASE_URL == DIRECT_URL.
      # In production these are two different endpoints (pooler vs direct).
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webbuilder
      DIRECT_URL: postgresql://postgres:postgres@db:5432/webbuilder
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # 生产环境请在根目录 .env 中覆盖 NEXTAUTH_SECRET（建议 openssl rand -base64 32）
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-docker-dev-only-change-me-32chars-min!!}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

